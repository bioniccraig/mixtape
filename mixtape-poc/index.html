<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#863bff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MixTape" />
    <title>MixTape — Say It With Music</title>

    <!-- Base OG tags (shown when sharing the home URL, not a specific tape) -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="MixTape" />
    <meta property="og:title"       content="MixTape — Say It With Music" />
    <meta property="og:description" content="Make a personalised mixtape for someone you love. Curate tracks, design a cassette, share a link." />
    <meta property="og:image"       content="https://mixtape-rho.vercel.app/og-image.png" />
    <meta property="og:url"         content="https://mixtape-rho.vercel.app" />
    <meta name="twitter:card"       content="summary_large_image" />
    <!-- MusicKit JS — Apple Music playback engine -->
    <script src="https://js-cdn.music.apple.com/musickit/v3/musickit.js" async></script>
    <!-- PWA service worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js'));
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
